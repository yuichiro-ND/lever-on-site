<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lever ON</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #fff;
  color: #111;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

.app {
  display: flex;
  align-items: center;
  border: 1px solid #eee;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  gap: 20px;
}

.app img {
  width: 72px;
  height: 72px;
  border-radius: 18px; /* ← iOSっぽい角丸 */
}

.app-content {
  flex: 1;
}

.links a {
  display: inline-block;
  margin-right: 10px;
  margin-top: 10px;
  padding: 8px 12px;
  border: 1px solid #111;
  border-radius: 8px;
  text-decoration: none;
  color: #111;
}
</style>
</head>

<body>
<div class="container">

<h1>Lever ON</h1>
<p>Lever ONはiOS / Androidアプリを開発しています。</p>

<h2>アプリ一覧</h2>

<div class="app">
  <img src="icons/jugpro.png">
  <div class="app-content">
    <h3>ジャグPro</h3>
    <div class="links">
      <a href="#">App Store</a>
      <a href="#">Google Play</a>
    </div>
  </div>
</div>

<div class="app">
  <img src="icons/kaiten.png">
  <div class="app-content">
    <h3>かいてん！</h3>
    <div class="links">
      <a href="#">App Store</a>
    </div>
  </div>
</div>

<div class="app">
  <img src="icons/monkey.png">
  <div class="app-content">
    <h3>モンキーV -5枚役カウンター-</h3>
    <div class="links">
      <a href="#">App Store</a>
      <a href="#">Google Play</a>
    </div>
  </div>
</div>

<div class="app">
  <img src="icons/chibariyo.png">
  <div class="app-content">
    <h3>チバリヨチェリーカウンター</h3>
    <div class="links">
      <a href="#">App Store</a>
    </div>
  </div>
</div>

<div class="app">
  <img src="icons/tokio.png">

    <h3>TOKIOハカマカウンター</h3>

    </div>
  </div>

<div class="app">
  <img src="icons/harakiri.png">

    <h3>ハラキリDRIVEカウンター</h3>

<div class="app">

      <a href="#">App Store</a>
    </div>
  </div>
</div>

</div>
</body>
</html>
